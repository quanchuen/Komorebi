# martin.yaml — Vector tile sources for komorebi
# Martin v1.x config format

postgres:
  connection_string: "postgres://osm_dev:osm_dev@localhost:5432/cyclist_map_dev?sslmode=disable"
  auto_publish: false
  tables:
    osm_roads:
      schema: osm
      table: roads
      srid: 4326
      geometry_column: geom
      geometry_type: LINESTRING
      minzoom: 8
      maxzoom: 18
      properties:
        name: text
        highway: text
        cycleway: text
        surface: text
        bicycle: text

    osm_landuse:
      schema: osm
      table: landuse
      srid: 4326
      geometry_column: geom
      geometry_type: GEOMETRY
      minzoom: 10
      maxzoom: 18
      properties:
        name: text
        landuse: text
        leisure: text

    routes:
      schema: routes
      table: route
      srid: 4326
      geometry_column: geometry
      geometry_type: LINESTRING
      minzoom: 8
      maxzoom: 18
      properties:
        id: uuid
        name: text
        difficulty: text
        status: text
        distance_m: float8

    venues:
      schema: environment
      table: venue
      srid: 4326
      geometry_column: geometry
      geometry_type: POINT
      minzoom: 12
      maxzoom: 18
      properties:
        name: text
        category: text
        brand: text

    traffic_signals:
      schema: environment
      table: traffic_signal
      srid: 4326
      geometry_column: geometry
      geometry_type: POINT
      minzoom: 14
      maxzoom: 18
