services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://osm_dev:osm_dev@localhost:5432/cyclist_map_dev?sslmode=disable
      VALHALLA_URL: http://valhalla:8002
    depends_on:
      - valhalla

  martin:
    image: ghcr.io/maplibre/martin:v0.14
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://osm_dev:osm_dev@localhost:5432/cyclist_map_dev?sslmode=disable
    volumes:
      - ./martin.yaml:/usr/local/share/martin/martin.yaml:ro
    command: ["--config", "/usr/local/share/martin/martin.yaml"]

  valhalla:
    image: ghcr.io/gis-ops/docker-valhalla/valhalla:latest
    ports:
      - "8002:8002"
    volumes:
      - valhalla_tiles:/custom_files
    environment:
      tile_urls: https://download.geofabrik.de/asia/japan/kanto-latest.osm.pbf

  plateau_shadow:
    build:
      context: ./pipelines/plateau_shadow
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://osm_dev:osm_dev@localhost:5432/cyclist_map_dev?sslmode=disable
    profiles:
      - pipelines
    command: >
      python pipeline.py
      --db-url "${DATABASE_URL}"
      --wards chiyoda,minato,shibuya
      --months 1,4,7,10

volumes:
  valhalla_tiles:
